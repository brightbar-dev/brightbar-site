{{- /* Newsletter subscribe form — Buttondown */ -}}
<div id="newsletter" style="border-top: 1px solid var(--border); margin-top: 2rem; padding-top: 1.5rem; text-align: center;">
  <p style="margin-bottom: 0.5rem; font-weight: 600;">Subscribe to the newsletter</p>
  <p style="margin-bottom: 1rem; color: var(--secondary); font-size: 0.9rem;">New posts delivered to your inbox. No spam, unsubscribe anytime.</p>
  <form
    action="https://buttondown.com/api/emails/newsletter-subscribe"
    method="post"
    target="popupwindow"
    onsubmit="window.open('https://buttondown.com/PLACEHOLDER_USERNAME', 'popupwindow')"
    style="display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;"
  >
    <input type="email" name="email" placeholder="you@example.com" required
      style="padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 4px; background: var(--theme); color: var(--primary); min-width: 220px;" />
    <button type="submit"
      style="padding: 0.5rem 1.5rem; background: var(--primary); color: var(--theme); border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">
      Subscribe
    </button>
  </form>
</div>
