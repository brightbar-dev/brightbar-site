baseURL = "https://brightbar.dev/"
languageCode = "en-us"
title = "Bright Bar"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "Developer tools that respect your privacy."
  author = "Bright Bar"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true

  [params.homeInfoParams]
    Title = "Bright Bar"
    Content = "Developer tools that respect your privacy."

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:hello@brightbar.dev"

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 10

[[menu.main]]
  identifier = "products"
  name = "Products"
  url = "/products/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
